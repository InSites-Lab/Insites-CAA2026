<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph — Ayelet HaShachar Water Tower</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc;
  --sidebar-bg: #f1f5f9;
  --card-bg: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-dim: #64748b;
  --text-muted: #94a3b8;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-light: rgba(59,130,246,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--sidebar-bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Header */
.header { background: var(--sidebar-bg); padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header h1 { font-size: 1rem; font-weight: 700; color: var(--text); }
.header-sub { font-size: 0.72rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
.header-actions { display: flex; gap: 8px; }
.btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-dim); padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.btn:hover { background: var(--border); color: var(--text); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-accent:hover { background: var(--accent-hover); }

/* Layout */
.layout { display: flex; flex: 1; overflow: hidden; }
.graph-canvas { flex: 1; position: relative; min-width: 0; }
.graph-canvas svg { width: 100%; height: 100%; display: block; }
.sidebar { width: 340px; min-width: 300px; background: var(--sidebar-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.2s, min-width 0.2s, padding 0.2s; overflow: hidden; }
.sidebar.collapsed { width: 0; min-width: 0; border-left: none; }
.sidebar-toggle { position: absolute; top: 50%; right: 0; transform: translateY(-50%); z-index: 10; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-dim); width: 24px; height: 48px; border-radius: 6px 0 0 6px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.sidebar-toggle:hover { background: var(--border); color: var(--text); }

/* Sidebar tabs */
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 0.78rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; background: transparent; border-top: none; border-left: none; border-right: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.sidebar-tab:hover { color: var(--text-dim); background: rgba(0,0,0,0.03); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.sidebar-content { flex: 1; overflow-y: auto; padding: 14px; }

/* Info tab */
.info-placeholder { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.84rem; }
.info-name { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
.info-badge { display: inline-block; font-size: 0.68rem; padding: 3px 10px; border-radius: 10px; color: #fff; font-weight: 600; margin-bottom: 10px; }
.info-meaning { font-size: 0.88rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 16px; }
.conn-section { margin-bottom: 16px; }
.conn-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
.conn-item { padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 5px; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.conn-item:hover { border-color: var(--accent); background: var(--accent-light); }
.conn-verb { color: var(--accent); font-weight: 500; }
.conn-target { color: var(--text); }

/* Analytics tab */
.search-input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.84rem; font-family: 'DM Sans', sans-serif; margin-bottom: 14px; }
.search-input:focus { outline: none; border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }
.filter-section { margin-bottom: 16px; }
.filter-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
.filter-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.filter-btn { padding: 4px 10px; border-radius: 14px; font-size: 0.72rem; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text-dim); font-family: 'DM Sans', sans-serif; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
.filter-btn:hover { border-color: var(--text-muted); }
.filter-btn.active { border-color: currentColor; background: rgba(59,130,246,0.08); }
.filter-count { font-size: 0.62rem; opacity: 0.7; }
.clear-filters { font-size: 0.72rem; color: var(--accent); cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; margin-bottom: 12px; display: none; }
.clear-filters.visible { display: inline-block; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
.stat-value { font-size: 1.4rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
.stat-label { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
.top-list { list-style: none; }
.top-item { padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 5px; font-size: 0.82rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.15s; }
.top-item:hover { border-color: var(--accent); }
.top-degree { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; font-size: 0.78rem; }

/* AI Query tab */
.ai-messages { flex: 1; overflow-y: auto; margin-bottom: 12px; max-height: calc(100vh - 260px); }
.ai-starter { padding: 20px; text-align: center; }
.ai-starter-label { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 12px; }
.ai-starter-btn { display: block; width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-dim); font-size: 0.82rem; cursor: pointer; text-align: left; margin-bottom: 6px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.ai-starter-btn:hover { border-color: var(--accent); color: var(--text); }
.ai-user-msg { background: var(--accent); color: #fff; padding: 8px 14px; border-radius: 12px 12px 4px 12px; margin-bottom: 8px; font-size: 0.84rem; margin-left: 40px; text-align: right; line-height: 1.5; }
.ai-bot-msg { border-left: 3px solid var(--accent); background: var(--card-bg); padding: 12px 14px; border-radius: 0 8px 8px 0; margin-bottom: 8px; font-size: 0.84rem; color: var(--text-dim); line-height: 1.55; max-height: 60%; overflow-y: auto; }
.ai-bot-msg strong { color: var(--text); }
.ai-bot-msg code { font-family: 'JetBrains Mono', monospace; background: var(--border); border-radius: 3px; padding: 1px 5px; font-size: 0.8rem; }
.ai-input-row { display: flex; gap: 8px; flex-shrink: 0; }
.ai-input { flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.84rem; font-family: 'DM Sans', sans-serif; }
.ai-input:focus { outline: none; border-color: var(--accent); }
.ai-input::placeholder { color: var(--text-muted); }
.ai-send { padding: 10px 16px; background: var(--accent); border: none; color: #fff; border-radius: 8px; cursor: pointer; font-size: 0.84rem; font-family: 'DM Sans', sans-serif; }
.ai-send:hover { background: var(--accent-hover); }
.ai-note { font-size: 0.68rem; color: var(--text-muted); text-align: center; margin-top: 8px; }

/* Legend */
.legend { position: absolute; bottom: 12px; left: 12px; background: rgba(255,255,255,0.92); backdrop-filter: blur(8px); padding: 10px 14px; border-radius: 10px; display: flex; flex-wrap: wrap; gap: 10px; z-index: 5; border: 1px solid var(--border); }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; color: var(--text-dim); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Toast */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card-bg); border: 1px solid var(--accent); color: var(--text); padding: 8px 20px; border-radius: 8px; font-size: 0.82rem; z-index: 100; animation: toastIn 0.3s ease-out; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Ayelet HaShachar Water Tower</h1>
    <div class="header-sub">CBSA Knowledge Graph · 14 nodes · 17 edges</div>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="copyJSON()" title="Copy graph data as JSON">Copy JSON</button>
  </div>
</div>

<div class="layout">
  <div class="graph-canvas" id="graph-canvas">
    <svg id="kg-svg"></svg>
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">◀</button>
    <div class="legend" id="legend"></div>
  </div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-tab="info" onclick="setTab('info')">Info</button>
      <button class="sidebar-tab" data-tab="analytics" onclick="setTab('analytics')">Analytics</button>
      <button class="sidebar-tab" data-tab="ai" onclick="setTab('ai')">AI Query</button>
    </div>
    <div class="sidebar-content" id="sidebar-content"></div>
  </div>
</div>

<script>
// ── DATA ──
const GRAPH_DATA = {
  nodes: [
    { id: "water_tower", name: "Ayelet HaShachar Water Tower", type: "Structure / Building", meaning: "1923 reinforced concrete tower — functional and ideological landmark of the kibbutz" },
    { id: "ayelet", name: "Kibbutz Ayelet HaShachar", type: "Place", meaning: "Founded 1918, Upper Galilee — Second Aliya pioneer settlement" },
    { id: "horseshoe", name: "Horseshoe Road Plan", type: "Architectural Element", meaning: "JCA engineer's layout encircling the historic core — tower at apex" },
    { id: "wadi", name: "Wadi Waqaz (Nahal Hatzor)", type: "Natural Phenomenon", meaning: "Sole early water source — site of inter-communal disputes" },
    { id: "arlich", name: "Michael Arlich", type: "Person", meaning: "Construction supervisor 1879–1945 — pioneer builder, Um Juni to Tel Aviv to Galilee" },
    { id: "ahva", name: "Ahva Group", type: "Social Group", meaning: "Gdud HaAvoda builders — inexperienced workers who conquered the profession" },
    { id: "pica", name: "JCA / PICA", type: "Social Group", meaning: "Funded settlement and infrastructure — omitted from the tower's plaque" },
    { id: "solel_boneh", name: "Solel Boneh", type: "Social Group", meaning: "Histadrut public works office — contracted Ahva for construction" },
    { id: "well_a", name: "Well A (1936)", type: "Structure / Building", meaning: "Hand-dug well — its opening triggered spontaneous celebration" },
    { id: "water_struggle", name: "Water Struggle 1918–1957", type: "Event", meaning: "40-year communal struggle over water access and supply" },
    { id: "mekorot", name: "Mekorot", type: "Social Group", meaning: "National water company — resolved chronic shortage (1951–57)" },
    { id: "second_aliya", name: "Second Aliya Ideology", type: "Collective Memory", meaning: "Pioneer labor, communal equality, conquest of work — founding ethos" },
    { id: "plaque", name: "Concrete Plaque", type: "Architectural Element", meaning: "Credits workers and supervisor, omits funders — ideological narration in stone" },
    { id: "construction_value", name: "Pioneer Construction Value", type: "Cultural Value", meaning: "Building without experience as ideological act — marking the everyday as worthy of permanence", value_type: "Technological" }
  ],
  edges: [
    { from: "water_tower", to: "ayelet", label: "landmark_of" },
    { from: "water_tower", to: "horseshoe", label: "centered_in" },
    { from: "ahva", to: "water_tower", label: "built" },
    { from: "arlich", to: "water_tower", label: "supervised" },
    { from: "arlich", to: "ahva", label: "directed" },
    { from: "solel_boneh", to: "ahva", label: "contracted" },
    { from: "pica", to: "ayelet", label: "funded" },
    { from: "wadi", to: "water_tower", label: "fed" },
    { from: "well_a", to: "water_tower", label: "pumped_to" },
    { from: "water_struggle", to: "wadi", label: "centered_on" },
    { from: "water_struggle", to: "pica", label: "appealed_to" },
    { from: "mekorot", to: "water_struggle", label: "resolved" },
    { from: "second_aliya", to: "ayelet", label: "motivated" },
    { from: "second_aliya", to: "construction_value", label: "expressed_through" },
    { from: "construction_value", to: "water_tower", label: "embodied_in" },
    { from: "plaque", to: "water_tower", label: "inscribed_on" },
    { from: "plaque", to: "pica", label: "omits" }
  ]
};

// ── [CA-EC] Color Map ──
const COLOR_BY_TYPE = {
  "Place":                { fill: "#6495ED", stroke: "#4a78d6" },
  "Structure / Building": { fill: "#B22222", stroke: "#8b1a1a" },
  "Architectural Element":{ fill: "#81C784", stroke: "#66a867" },
  "Person":               { fill: "#FF69B4", stroke: "#d94f96" },
  "Event":                { fill: "#FFA07A", stroke: "#d98060" },
  "Story / Narrative":    { fill: "#FFE4B5", stroke: "#d4bc8e" },
  "Social Group":         { fill: "#FFD700", stroke: "#ccac00" },
  "Cultural Value":       { fill: "#FFC107", stroke: "#cc9a06" },
  "Natural Phenomenon":   { fill: "#1E90FF", stroke: "#1674cc" },
  "Artwork / Artefact":   { fill: "#800080", stroke: "#5c005c" },
  "Tradition / Custom":   { fill: "#8B4513", stroke: "#6b340e" },
  "Historical Period":    { fill: "#00B4B4", stroke: "#008f8f" },
  "Religion / Belief":    { fill: "#DA70D6", stroke: "#b05aac" },
  "Collective Memory":    { fill: "#4B0082", stroke: "#370060" }
};
const FALLBACK_COLOR = { fill: "#777", stroke: "#555" };

function getColor(type) { return COLOR_BY_TYPE[type] || FALLBACK_COLOR; }
function getRadius(node) {
  if (node.id === 'water_tower') return 15; // asset
  if (node.type === 'Cultural Value') return 11;
  return 9;
}

// ── State ──
let selectedNode = null;
let activeTab = 'info';
let searchQuery = '';
let activeFilters = new Set();
let sidebarOpen = true;
let simulation, svg, g, linkG, labelG, nodeG;
let nodesData, edgesData;

// ── Init ──
function init() {
  nodesData = GRAPH_DATA.nodes.map(n => ({...n}));
  edgesData = GRAPH_DATA.edges.map(e => ({...e, source: e.from, target: e.to}));

  const canvas = document.getElementById('graph-canvas');
  const W = canvas.clientWidth, H = canvas.clientHeight;

  svg = d3.select('#kg-svg').attr('width', W).attr('height', H);
  svg.selectAll('*').remove();

  // Defs: arrow marker
  svg.append('defs').append('marker')
    .attr('id','arrow').attr('viewBox','0 -5 10 10')
    .attr('refX', 22).attr('refY', 0).attr('orient','auto')
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .append('path').attr('d','M0,-4L10,0L0,4').attr('fill','#94a3b8');

  g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform)));
  svg.on('click', (e) => { if (e.target === svg.node()) { selectNode(null); } });

  // Edges (curved arcs)
  linkG = g.append('g');
  labelG = g.append('g');
  nodeG = g.append('g');

  const links = linkG.selectAll('path').data(edgesData).join('path')
    .attr('fill', 'none').attr('stroke', '#cbd5e1').attr('stroke-width', 1.5)
    .attr('marker-end', 'url(#arrow)').attr('class', 'edge');

  const labels = labelG.selectAll('text').data(edgesData).join('text')
    .attr('font-size', 10).attr('fill', '#64748b').attr('text-anchor', 'middle')
    .attr('dy', -6).attr('font-family', 'DM Sans, sans-serif').attr('class', 'edge-label')
    .text(d => d.label);

  const nodes = nodeG.selectAll('g').data(nodesData).join('g')
    .attr('class', 'node-group').style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    );

  // Node circles
  nodes.append('circle')
    .attr('r', d => getRadius(d))
    .attr('fill', d => getColor(d.type).fill)
    .attr('stroke', '#ffffff').attr('stroke-width', 2)
    .attr('class', 'node-circle')
    .on('mouseenter', function(e, d) {
      d3.select(this).transition().duration(120).attr('r', getRadius(d) + 4).attr('stroke-width', 3);
    })
    .on('mouseleave', function(e, d) {
      d3.select(this).transition().duration(120).attr('r', getRadius(d)).attr('stroke-width', 2);
    });

  // Star for asset node
  nodes.filter(d => d.id === 'water_tower').append('text')
    .attr('text-anchor', 'middle').attr('dy', 5).attr('font-size', 12).attr('fill', '#fff').text('\u2605');

  // Node labels
  nodes.append('text')
    .attr('dy', d => getRadius(d) + 14)
    .attr('text-anchor', 'middle').attr('font-size', 11).attr('fill', '#1e293b')
    .attr('font-weight', 500).attr('font-family', 'DM Sans, sans-serif')
    .style('text-shadow', '0 1px 3px rgba(255,255,255,0.8)')
    .text(d => d.name.length > 20 ? d.name.slice(0, 20) + '\u2026' : d.name);

  // Click handler
  nodes.on('click', (e, d) => { e.stopPropagation(); selectNode(d); });

  // Simulation
  simulation = d3.forceSimulation(nodesData)
    .force('link', d3.forceLink(edgesData).id(d => d.id).distance(140))
    .force('charge', d3.forceManyBody().strength(-380))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collide', d3.forceCollide().radius(d => getRadius(d) + 20));

  simulation.on('tick', () => {
    // Curved edges
    links.attr('d', d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const offset = 20;
      const mx = (d.source.x + d.target.x) / 2 + (-dy / dist) * offset;
      const my = (d.source.y + d.target.y) / 2 + (dx / dist) * offset;
      return `M${d.source.x},${d.source.y} Q${mx},${my} ${d.target.x},${d.target.y}`;
    });
    labels.attr('x', d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      return (d.source.x + d.target.x) / 2 + (-dy / dist) * 20;
    }).attr('y', d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      return (d.source.y + d.target.y) / 2 + (dx / dist) * 20;
    });
    nodeG.selectAll('.node-group').attr('transform', d => `translate(${d.x},${d.y})`);
  });

  buildLegend();
  renderSidebar();
}

// ── Legend ──
function buildLegend() {
  const types = [...new Set(GRAPH_DATA.nodes.map(n => n.type))];
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  types.forEach(t => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${getColor(t).fill}"></div>${t}`;
    legend.appendChild(item);
  });
}

// ── Selection ──
function selectNode(node) {
  selectedNode = node;
  // Update edge highlighting
  g.selectAll('.edge').transition().duration(200)
    .attr('stroke-opacity', d => !node ? 0.6 : (d.source.id===node.id || d.target.id===node.id) ? 1 : 0.1)
    .attr('stroke-width', d => !node ? 1.5 : (d.source.id===node.id || d.target.id===node.id) ? 2.5 : 1);
  g.selectAll('.edge-label').transition().duration(200)
    .attr('fill-opacity', d => !node ? 1 : (d.source.id===node.id || d.target.id===node.id) ? 1 : 0.1);
  // Update node highlighting
  nodeG.selectAll('.node-circle').transition().duration(200)
    .attr('opacity', d => !node ? 1 : (d.id===node.id || edgesData.some(e => (e.source.id===node.id && e.target.id===d.id) || (e.target.id===node.id && e.source.id===d.id))) ? 1 : 0.3);

  if (activeTab !== 'info') setTab('info');
  else renderSidebar();
}

// ── Sidebar ──
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('sidebar-toggle').textContent = sidebarOpen ? '\u25C0' : '\u25B6';
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  renderSidebar();
}

function renderSidebar() {
  const el = document.getElementById('sidebar-content');
  el.innerHTML = '';
  if (activeTab === 'info') renderInfoTab(el);
  else if (activeTab === 'analytics') renderAnalyticsTab(el);
  else if (activeTab === 'ai') renderAITab(el);
}

// ── Info Tab ──
function renderInfoTab(el) {
  if (!selectedNode) {
    el.innerHTML = '<div class="info-placeholder">Click a node to inspect it</div>';
    return;
  }
  const n = selectedNode;
  const c = getColor(n.type);

  el.innerHTML = `
    <div class="info-name">${esc(n.name)}</div>
    <div class="info-badge" style="background:${c.fill}">${esc(n.type)}</div>
    <div class="info-meaning">${esc(n.meaning)}</div>
  `;

  const outgoing = edgesData.filter(e => e.source.id === n.id);
  const incoming = edgesData.filter(e => e.target.id === n.id);

  if (outgoing.length) {
    const sec = document.createElement('div');
    sec.className = 'conn-section';
    sec.innerHTML = `<div class="conn-label">Outgoing (${outgoing.length})</div>`;
    outgoing.forEach(e => {
      const target = nodesData.find(nd => nd.id === e.target.id);
      const item = document.createElement('div');
      item.className = 'conn-item';
      item.innerHTML = `<span style="color:#f87171;font-weight:600">\u2192</span> <span class="conn-verb">[${esc(e.label)}]</span> <span class="conn-target">${esc(target?.name || '?')}</span>`;
      item.onclick = () => { selectNode(target); };
      sec.appendChild(item);
    });
    el.appendChild(sec);
  }

  if (incoming.length) {
    const sec = document.createElement('div');
    sec.className = 'conn-section';
    sec.innerHTML = `<div class="conn-label">Incoming (${incoming.length})</div>`;
    incoming.forEach(e => {
      const source = nodesData.find(nd => nd.id === e.source.id);
      const item = document.createElement('div');
      item.className = 'conn-item';
      item.innerHTML = `<span style="color:#60a5fa;font-weight:600">\u2190</span> <span class="conn-verb">[${esc(e.label)}]</span> <span class="conn-target">${esc(source?.name || '?')}</span>`;
      item.onclick = () => { selectNode(source); };
      sec.appendChild(item);
    });
    el.appendChild(sec);
  }
}

// ── Analytics Tab ──
function renderAnalyticsTab(el) {
  // Search
  const input = document.createElement('input');
  input.className = 'search-input';
  input.placeholder = 'Search nodes by name or meaning\u2026';
  input.value = searchQuery;
  input.oninput = (e) => { searchQuery = e.target.value; renderAnalyticsTab(el); };
  el.appendChild(input);

  // Type filters
  const types = [...new Set(GRAPH_DATA.nodes.map(n => n.type))].sort();
  const filterSec = document.createElement('div');
  filterSec.className = 'filter-section';
  filterSec.innerHTML = '<div class="filter-label">Entity Types</div>';
  const clearBtn = document.createElement('button');
  clearBtn.className = 'clear-filters' + (activeFilters.size ? ' visible' : '');
  clearBtn.textContent = '\u2715 Clear filters';
  clearBtn.onclick = () => { activeFilters.clear(); renderAnalyticsTab(el); };
  filterSec.appendChild(clearBtn);
  const filterGrid = document.createElement('div');
  filterGrid.className = 'filter-grid';
  types.forEach(t => {
    const count = GRAPH_DATA.nodes.filter(n => n.type === t).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilters.has(t) ? ' active' : '');
    btn.style.color = getColor(t).fill;
    btn.innerHTML = `${esc(t)} <span class="filter-count">(${count})</span>`;
    btn.onclick = () => {
      if (activeFilters.has(t)) activeFilters.delete(t); else activeFilters.add(t);
      renderAnalyticsTab(el);
    };
    filterGrid.appendChild(btn);
  });
  filterSec.appendChild(filterGrid);
  el.appendChild(filterSec);

  // Filtered node list
  let filtered = GRAPH_DATA.nodes;
  if (activeFilters.size) filtered = filtered.filter(n => activeFilters.has(n.type));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(n => n.name.toLowerCase().includes(q) || n.meaning.toLowerCase().includes(q));
  }

  // Stats
  const statsSec = document.createElement('div');
  statsSec.innerHTML = '<div class="filter-label" style="margin-bottom:8px">Statistics</div>';
  const statsGrid = document.createElement('div');
  statsGrid.className = 'stats-grid';
  const density = (2 * GRAPH_DATA.edges.length / (GRAPH_DATA.nodes.length * (GRAPH_DATA.nodes.length - 1))).toFixed(2);
  [{v: GRAPH_DATA.nodes.length, l: 'Nodes'}, {v: GRAPH_DATA.edges.length, l: 'Edges'}, {v: types.length, l: 'Types'}, {v: density, l: 'Density'}]
    .forEach(s => {
      statsGrid.innerHTML += `<div class="stat-card"><div class="stat-value">${s.v}</div><div class="stat-label">${s.l}</div></div>`;
    });
  statsSec.appendChild(statsGrid);
  el.appendChild(statsSec);

  // Most connected
  const degrees = {};
  GRAPH_DATA.nodes.forEach(n => degrees[n.id] = 0);
  GRAPH_DATA.edges.forEach(e => { degrees[e.from]++; degrees[e.to]++; });
  const topNodes = [...GRAPH_DATA.nodes].sort((a, b) => degrees[b.id] - degrees[a.id]).slice(0, 5);

  const topSec = document.createElement('div');
  topSec.innerHTML = '<div class="filter-label" style="margin-bottom:8px">Most Connected</div>';
  const topList = document.createElement('ul');
  topList.className = 'top-list';
  topNodes.forEach(n => {
    const item = document.createElement('li');
    item.className = 'top-item';
    item.innerHTML = `<span style="display:flex;align-items:center;gap:6px"><span class="legend-dot" style="background:${getColor(n.type).fill}"></span>${esc(n.name.length > 22 ? n.name.slice(0,22)+'\u2026' : n.name)}</span><span class="top-degree">${degrees[n.id]}</span>`;
    item.onclick = () => { const nd = nodesData.find(x => x.id === n.id); if (nd) selectNode(nd); };
    topList.appendChild(item);
  });
  topSec.appendChild(topList);
  el.appendChild(topSec);

  // Matching nodes (if search/filter active)
  if (searchQuery || activeFilters.size) {
    const resSec = document.createElement('div');
    resSec.innerHTML = `<div class="filter-label" style="margin-top:16px;margin-bottom:8px">Matching Nodes (${filtered.length})</div>`;
    const resList = document.createElement('ul');
    resList.className = 'top-list';
    filtered.forEach(n => {
      const item = document.createElement('li');
      item.className = 'top-item';
      item.innerHTML = `<span style="display:flex;align-items:center;gap:6px"><span class="legend-dot" style="background:${getColor(n.type).fill}"></span>${esc(n.name.length > 22 ? n.name.slice(0,22)+'\u2026' : n.name)}</span>`;
      item.onclick = () => { const nd = nodesData.find(x => x.id === n.id); if (nd) selectNode(nd); };
      resList.appendChild(item);
    });
    resSec.appendChild(resList);
    el.appendChild(resSec);
  }
}

// ── AI Query Tab ──
let aiMessages = [];

function renderAITab(el) {
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  el.style.height = '100%';

  const msgArea = document.createElement('div');
  msgArea.className = 'ai-messages';

  if (!aiMessages.length) {
    const starter = document.createElement('div');
    starter.className = 'ai-starter';
    starter.innerHTML = '<div class="ai-starter-label">Ask questions about the knowledge graph</div>';
    const starters = [
      'What is the most connected entity and why?',
      'How does the plaque relate to JCA/PICA?',
      'Which nodes represent cultural values?',
      'Explain the water struggle narrative'
    ];
    starters.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'ai-starter-btn';
      btn.textContent = q;
      btn.onclick = () => submitAI(q);
      starter.appendChild(btn);
    });
    msgArea.appendChild(starter);
  } else {
    aiMessages.forEach(m => {
      const div = document.createElement('div');
      div.className = m.role === 'user' ? 'ai-user-msg' : 'ai-bot-msg';
      div.innerHTML = m.role === 'user' ? esc(m.text) : parseMarkdown(m.text);
      msgArea.appendChild(div);
    });
    setTimeout(() => msgArea.scrollTop = msgArea.scrollHeight, 0);
  }
  el.appendChild(msgArea);

  const inputRow = document.createElement('div');
  inputRow.className = 'ai-input-row';
  const input = document.createElement('input');
  input.className = 'ai-input';
  input.placeholder = 'Ask about the graph\u2026';
  input.onkeydown = (e) => { if (e.key === 'Enter') submitAI(input.value); };
  const sendBtn = document.createElement('button');
  sendBtn.className = 'ai-send';
  sendBtn.textContent = 'Send';
  sendBtn.onclick = () => submitAI(input.value);
  inputRow.appendChild(input);
  inputRow.appendChild(sendBtn);
  el.appendChild(inputRow);

  const note = document.createElement('div');
  note.className = 'ai-note';
  note.textContent = 'AI queries require Claude API key \u2014 local graph analysis available';
  el.appendChild(note);
}

function submitAI(query) {
  if (!query.trim()) return;
  aiMessages.push({ role: 'user', text: query.trim() });

  // Local graph-based response (no API call needed for basic queries)
  const response = localGraphAnswer(query.trim());
  aiMessages.push({ role: 'assistant', text: response });

  renderSidebar();
}

function localGraphAnswer(query) {
  const q = query.toLowerCase();
  const degrees = {};
  GRAPH_DATA.nodes.forEach(n => degrees[n.id] = 0);
  GRAPH_DATA.edges.forEach(e => { degrees[e.from]++; degrees[e.to]++; });

  if (q.includes('most connected') || q.includes('central')) {
    const top = [...GRAPH_DATA.nodes].sort((a, b) => degrees[b.id] - degrees[a.id]).slice(0, 3);
    return `The most connected entities are:\n\n${top.map((n,i) => `${i+1}. **${n.name}** (${degrees[n.id]} connections) \u2014 ${n.meaning}`).join('\n\n')}`;
  }
  if (q.includes('plaque') || q.includes('pica') || q.includes('jca')) {
    return `The **Concrete Plaque** is an architectural element inscribed on the water tower. It credits the workers (Ahva Group) and supervisor (Michael Arlich) but deliberately **omits JCA/PICA** \u2014 the organization that funded the construction. This selective attribution encodes labor ideology in permanent material: the builders are commemorated while the capitalist funder is erased from the physical record.`;
  }
  if (q.includes('cultural value') || q.includes('value')) {
    const vals = GRAPH_DATA.nodes.filter(n => n.type === 'Cultural Value');
    return `The graph contains **${vals.length} Cultural Value node(s)**:\n\n${vals.map(v => `- **${v.name}**: ${v.meaning}`).join('\n\n')}\n\nThis value is \`expressed_through\` the Second Aliya Ideology and \`embodied_in\` the Water Tower.`;
  }
  if (q.includes('water struggle') || q.includes('struggle')) {
    const edges = GRAPH_DATA.edges.filter(e => e.from === 'water_struggle' || e.to === 'water_struggle');
    return `The **Water Struggle 1918\u20131957** is an Event node representing 40 years of communal struggle over water access. Its connections:\n\n${edges.map(e => {
      const isFrom = e.from === 'water_struggle';
      const other = GRAPH_DATA.nodes.find(n => n.id === (isFrom ? e.to : e.from));
      return `- ${isFrom ? '\u2192' : '\u2190'} \`${e.label}\` ${other?.name || '?'}`;
    }).join('\n')}\n\nMekorot ultimately **resolved** this struggle through regional water connections (1951\u201357).`;
  }

  // Generic fallback
  const matchingNodes = GRAPH_DATA.nodes.filter(n => n.name.toLowerCase().includes(q) || n.meaning.toLowerCase().includes(q));
  if (matchingNodes.length) {
    return `Found **${matchingNodes.length} matching node(s)**:\n\n${matchingNodes.map(n => `- **${n.name}** (${n.type}): ${n.meaning}`).join('\n\n')}`;
  }
  return `The graph contains **${GRAPH_DATA.nodes.length} nodes** and **${GRAPH_DATA.edges.length} edges** about the Ayelet HaShachar Water Tower. Try asking about specific entities, connections, cultural values, or the most connected nodes.`;
}

function parseMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n- /g, '<br>\u2022 ')
    .replace(/\n(\d+)\. /g, '<br>$1. ')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Copy JSON ──
function copyJSON() {
  const json = JSON.stringify(GRAPH_DATA, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = 'Graph JSON copied to clipboard';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }).catch(() => {
    // Fallback for file:// protocol
    const ta = document.createElement('textarea');
    ta.value = JSON.stringify(GRAPH_DATA, null, 2);
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = 'Graph JSON copied to clipboard';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  });
}

// ── Resize ──
window.addEventListener('resize', () => {
  const canvas = document.getElementById('graph-canvas');
  svg.attr('width', canvas.clientWidth).attr('height', canvas.clientHeight);
  simulation.force('center', d3.forceCenter(canvas.clientWidth / 2, canvas.clientHeight / 2));
  simulation.alpha(0.3).restart();
});

// ── Start ──
init();
</script>
