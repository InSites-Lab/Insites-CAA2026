<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBSA Dashboard — Tuba-Zangariyye Dolmen Field</title>
<style>
:root{
  --bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;
  --text:#1e293b;--dim:#64748b;--muted:#94a3b8;
  --accent:#2563eb;--accent-light:#dbeafe;
  --green:#16a34a;--amber:#d97706;--red:#dc2626;
  --green-bg:#dcfce7;--amber-bg:#fef3c7;--red-bg:#fee2e2;
  --serif:'Georgia','Times New Roman',serif;
  --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:0.88rem;line-height:1.6}
.dashboard{max-width:1200px;margin:0 auto;padding:20px}

/* Header */
.header{text-align:center;padding:28px 20px 20px;border-bottom:2px solid var(--border);margin-bottom:20px}
.header h1{font-family:var(--serif);font-size:1.6rem;font-weight:700;color:var(--text);margin-bottom:4px}
.header .subtitle{color:var(--dim);font-size:0.84rem}
.header .meta{display:flex;justify-content:center;gap:24px;margin-top:12px;font-size:0.78rem;color:var(--muted)}
.header .meta span{display:flex;align-items:center;gap:4px}

/* Tabs */
.tabs{display:flex;flex-wrap:wrap;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;padding-bottom:0}
.tab{padding:9px 16px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:0.8rem;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s;border-radius:6px 6px 0 0}
.tab:hover{color:var(--text);background:#f1f5f9}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

/* Highlight banner */
.highlight-banner{background:var(--accent-light);border:1px solid var(--accent);border-radius:8px;padding:8px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;font-size:0.82rem}
.highlight-banner .clear{background:var(--accent);color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:0.76rem}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.card h3{font-family:var(--serif);font-size:1rem;margin-bottom:10px;color:var(--text)}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}

/* KPIs */
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.kpi .value{font-size:1.6rem;font-weight:700;color:var(--accent)}
.kpi .label{font-size:0.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px}

/* Pills */
.pill{display:inline-block;padding:2px 10px;border-radius:10px;font-size:0.7rem;font-weight:500;margin:2px;cursor:pointer;transition:all 0.15s}
.pill:hover{opacity:0.8}
.pill-value{background:#dbeafe;color:#1d4ed8}
.pill-context{background:#fef3c7;color:#92400e}
.pill-rating-high{background:var(--green-bg);color:var(--green)}
.pill-rating-medium-high{background:#d1fae5;color:#059669}
.pill-rating-medium{background:var(--amber-bg);color:var(--amber)}
.pill-rating-low-medium{background:#ffedd5;color:#c2410c}
.pill-rating-low{background:var(--red-bg);color:var(--red)}
.pill.highlighted{outline:2px solid var(--accent);outline-offset:1px}

/* Evidence indicators */
.ev{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:4px;vertical-align:middle}
.ev-sourced{background:var(--green)}.ev-inferred{background:var(--amber)}.ev-uncertain{background:var(--muted)}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:0.82rem}
th{background:#f1f5f9;text-align:left;padding:8px 10px;font-weight:600;font-size:0.76rem;text-transform:uppercase;letter-spacing:0.03em;color:var(--dim);border-bottom:2px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}

/* Nara cards */
.nara-card{border-left:4px solid var(--muted);padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:0 8px 8px 0;margin-bottom:10px}
.nara-card.high{border-left-color:var(--green)}
.nara-card.medium-high{border-left-color:#059669}
.nara-card.medium{border-left-color:var(--amber)}
.nara-card.low-medium{border-left-color:#c2410c}
.nara-card.low{border-left-color:var(--red)}

/* Significance block */
.significance{font-family:var(--serif);font-size:0.92rem;line-height:1.75;padding:24px;background:linear-gradient(135deg,#fefce8,#fff7ed);border:1px solid #fde68a;border-radius:10px}

/* Timeline */
.tl-item{display:flex;gap:14px;margin-bottom:16px;position:relative}
.tl-dot{width:12px;height:12px;border-radius:50%;margin-top:4px;flex-shrink:0}
.tl-line{position:absolute;left:5px;top:16px;bottom:-16px;width:2px;background:var(--border)}
.tl-item:last-child .tl-line{display:none}
.tl-content{flex:1}
.tl-date{font-weight:600;font-size:0.82rem;color:var(--text)}
.tl-label{color:var(--dim);font-size:0.82rem}
.ct-structure{background:#3b82f6}.ct-use{background:#8b5cf6}.ct-setting{background:#f59e0b}.ct-infrastructure{background:#6b7280}.ct-documentation{background:#06b6d4}

/* Heat matrix */
.heat-cell{width:100%;height:100%;min-height:32px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:0.78rem;border-radius:4px}
.heat-3{background:#fee2e2;color:#991b1b}.heat-2{background:#fef3c7;color:#92400e}.heat-1{background:#f0fdf4;color:#166534}

/* Comparator cards */
.comp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.comp-card h4{font-family:var(--serif);margin-bottom:6px}
.criteria-bar{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.criteria-pill{padding:3px 10px;border-radius:10px;font-size:0.7rem;font-weight:500}

/* Process columns */
.process-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* KG tab dark */
.kg-tab{background:#0a1120;border-radius:10px;padding:16px;color:#e2e8f0;min-height:400px;position:relative}
.kg-banner{background:rgba(30,41,59,0.9);border:1px solid #334155;border-radius:8px;padding:10px 16px;margin-bottom:12px;font-size:0.78rem;color:#94a3b8}

/* Section headers */
.section-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:10px;font-weight:600}

/* Source list */
.source-item{padding:8px 12px;background:#f8fafc;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;font-size:0.8rem}

/* Hidden sections */
.tab-content{display:none}
.tab-content.active{display:block}

/* Responsive */
@media(max-width:768px){.card-grid{grid-template-columns:1fr 1fr}.process-grid{grid-template-columns:1fr}.tabs{gap:2px}.tab{padding:7px 10px;font-size:0.74rem}}
</style>
</head>

function isHighlighted(type, ids) {
  if (!highlight) return false;
  if (highlight.type === 'value' && type === 'value') return ids.includes(highlight.id);
  if (highlight.type === 'context' && type === 'context') return ids.includes(highlight.id);
  if (highlight.type === 'value' && type === 'context') {
    const ctx = DATA.contexts.find(c => ids.includes(c.id));
    return ctx && ctx.relatedValues.includes(highlight.id);
  }
  if (highlight.type === 'context' && type === 'value') {
    const ctx = DATA.contexts.find(c => c.id === highlight.id);
    return ctx && ctx.relatedValues.some(v => ids.includes(v));
  }
  return false;
}

function setHighlight(type, id) {
  if (highlight && highlight.type === type && highlight.id === id) { highlight = null; }
  else { highlight = {type, id}; }
  render();
}

function switchTab(key) { currentTab = key; render(); }

function renderHighlightBanner() {
  if (!highlight) return '';
  const label = highlight.type === 'value' ? highlight.id : DATA.contexts.find(c=>c.id===highlight.id)?.type || highlight.id;
  return `<div class="highlight-banner">Highlighting: <strong>${label}</strong> (${highlight.type}) <button class="clear" onclick="highlight=null;render()">Clear</button></div>`;
}

function renderOverview() {
  const ratingCounts = {};
  DATA.authenticity.grid.forEach(r => { ratingCounts[r.rating] = (ratingCounts[r.rating]||0)+1; });
  return `
    <div class="card-grid">
      <div class="kpi"><div class="value">${DATA.values.length}</div><div class="label">Values Identified</div></div>
      <div class="kpi"><div class="value">${DATA.values.filter(v=>v.evidence==='sourced').length}/${DATA.values.length}</div><div class="label">Evidence Rate</div></div>
      <div class="kpi"><div class="value">${DATA.contexts.length}</div><div class="label">Contexts</div></div>
      <div class="kpi"><div class="value">${DATA.dataQuality.gaps.length}</div><div class="label">Data Gaps</div></div>
    </div>
    <div class="card">
      <h3>Asset Description</h3>
      <p><strong>${DATA.asset.name}</strong></p>
      <p style="color:var(--dim);margin-top:4px">${DATA.asset.location}</p>
      <p style="margin-top:8px">${DATA.asset.description}</p>
      <p style="margin-top:6px;font-size:0.8rem;color:var(--dim)">${DATA.asset.period}</p>
    </div>
    <div class="card">
      <h3>Integrity Range</h3>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
        ${DATA.authenticity.grid.map(g => `<div style="flex:1;min-width:100px"><div class="section-label">${g.aspect}</div><span class="pill ${RATING_MAP[g.rating]}">${g.rating}</span></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <h3>Evidence Types</h3>
      <div class="section-label" style="margin-top:8px">Present</div>
      <p>${DATA.dataQuality.evidenceTypes.present.join(' · ')}</p>
      <div class="section-label" style="margin-top:10px">Absent</div>
      <p style="color:var(--red)">${DATA.dataQuality.evidenceTypes.absent.join(' · ')}</p>
    </div>
    <div class="card">
      <h3>Data Gaps</h3>
      ${DATA.dataQuality.gaps.map(g => `<p style="margin:4px 0;font-size:0.82rem">• ${g}</p>`).join('')}
    </div>`;
}

function renderTimeline() {
  return DATA.timeline.map((t,i) => `
    <div class="tl-item">
      <div style="position:relative">
        <div class="tl-dot" style="background:${CT_COLORS[t.changeType]||'#94a3b8'}"></div>
        <div class="tl-line"></div>
      </div>
      <div class="tl-content">
        <div class="tl-date">${t.year} <span class="pill" style="background:${CT_COLORS[t.changeType]||'#e2e8f0'};color:#fff;font-size:0.66rem;vertical-align:middle">${t.changeType}</span></div>
        <div class="tl-label">${t.label}</div>
      </div>
    </div>`).join('') +
    `<div class="card" style="margin-top:16px"><h3>Change Type Distribution</h3>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
    ${Object.entries(CT_COLORS).map(([k,c]) => {
      const count = DATA.timeline.filter(t=>t.changeType===k).length;
      return count ? `<span style="display:flex;align-items:center;gap:4px;font-size:0.78rem"><span style="width:10px;height:10px;border-radius:50%;background:${c}"></span>${k}: ${count}</span>` : '';
    }).join('')}
    </div></div>`;
}

function renderContexts() {
  return DATA.contexts.map(c => {
    const hl = isHighlighted('context',[c.id]) ? ' highlighted' : '';
    return `<div class="card" onclick="setHighlight('context','${c.id}')" style="cursor:pointer${hl?' ;outline:2px solid var(--accent)':''}">
      <h3>${c.type}</h3>
      <p>${c.label}</p>
      <div style="margin-top:8px"><span class="section-label">Timespan:</span> ${c.timespan}</div>
      <div style="margin-top:6px">${c.relatedValues.map(v => `<span class="pill pill-value${isHighlighted('value',[v])?' highlighted':''}" onclick="event.stopPropagation();setHighlight('value','${v}')">${v}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function renderValues() {
  const evIcon = e => e==='sourced'?'<span class="ev ev-sourced"></span>●':e==='inferred'?'<span class="ev ev-inferred"></span>◐':'<span class="ev ev-uncertain"></span>○';
  let html = DATA.values.map(v => {
    const hl = isHighlighted('value',[v.category]);
    return `<div class="card" onclick="setHighlight('value','${v.category}')" style="cursor:pointer${hl?' ;outline:2px solid var(--accent)':''}">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <h3>${v.name}</h3>
        <span>${evIcon(v.evidence)}</span>
      </div>
      <span class="pill pill-value">${v.category}</span>
      <p style="margin-top:8px">${v.summary}</p>
    </div>`;
  }).join('');

  html += `<div class="card"><h3>Attribute-Value-Significance-Implication</h3>
    <div style="overflow-x:auto"><table>
    <tr><th>Attribute</th><th>Value(s)</th><th>Significance</th><th>Implication</th></tr>
    ${DATA.attributeTable.map(r => `<tr>
      <td>${r.attribute}</td>
      <td>${r.values.map(v=>`<span class="pill pill-value${isHighlighted('value',[v])?' highlighted':''}">${v}</span>`).join('')}</td>
      <td>${r.significance}</td>
      <td style="color:var(--red);font-size:0.8rem">${r.implication}</td>
    </tr>`).join('')}
    </table></div></div>`;
  return html;
}

function renderIntegrity() {
  let html = DATA.authenticity.grid.map(g => `
    <div class="nara-card ${g.rating}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <strong>${g.aspect}</strong>
        <span class="pill ${RATING_MAP[g.rating]}">${g.rating}</span>
      </div>
      <p style="font-size:0.82rem;color:var(--dim);margin-bottom:6px">${g.description}</p>
      <div>${g.valueExpression.split(', ').map(v=>`<span class="pill pill-value${isHighlighted('value',[v])?' highlighted':''}" onclick="setHighlight('value','${v}')">${v}</span>`).join('')}</div>
    </div>`).join('');
  html += `<div class="card"><h3>Summary</h3><p>${DATA.authenticity.summary}</p></div>`;
  return html;
}

function renderComparative() {
  const criteriaColor = v => v==='high'?'background:var(--green-bg);color:var(--green)':v==='moderate'?'background:var(--amber-bg);color:var(--amber)':v==='low'?'background:var(--red-bg);color:var(--red)':'background:#f1f5f9;color:var(--dim)';
  let html = DATA.comparative.comparators.map(c => `
    <div class="comp-card">
      <h4>${c.name}</h4>
      <p style="font-size:0.78rem;color:var(--dim)">${c.period}</p>
      <p style="margin-top:8px;font-size:0.82rem">${c.distinction}</p>
      <div class="criteria-bar">
        ${Object.entries(c.criteria).map(([k,v])=>`<span class="criteria-pill" style="${criteriaColor(v)}">${k}: ${v}</span>`).join('')}
      </div>
    </div>`).join('');
  html += `<div class="card"><h3>Comparison Summary</h3><p>${DATA.comparative.summary}</p><p style="margin-top:8px;font-size:0.78rem;color:var(--muted)">Source note: All comparators from uploaded material (Priority A).</p></div>`;
  return html;
}

function renderSignificance() {
  return `<div class="significance">${DATA.significance.statement.split('\n\n').map(p=>`<p style="margin-bottom:14px">${p}</p>`).join('')}</div>`;
}

function renderVulnerability() {
  const aspects = ['form','material','use','setting'];
  const aspectRatings = {};
  DATA.authenticity.grid.forEach(g => {
    if (g.aspect.includes('Form')) aspectRatings.form = g.rating;
    if (g.aspect.includes('Material')) aspectRatings.material = g.rating;
    if (g.aspect.includes('Use')) aspectRatings.use = g.rating;
    if (g.aspect.includes('Setting')) aspectRatings.setting = g.rating;
  });
  let html = `<div class="card"><h3>Vulnerability Matrix: Values × Nara Aspects</h3>
    <p style="font-size:0.78rem;color:var(--dim);margin-bottom:12px">Impact: 3 = severe damage to value · 2 = moderate · 1 = minor/indirect</p>
    <div style="overflow-x:auto"><table>
    <tr><th>Value</th>${aspects.map(a=>`<th style="text-align:center">${a}<br><span class="pill ${RATING_MAP[aspectRatings[a]]||''}" style="font-size:0.64rem">${aspectRatings[a]||'—'}</span></th>`).join('')}</tr>
    ${DATA.vulnerability.map(v=>`<tr><td><strong>${v.value}</strong></td>${aspects.map(a=>`<td style="text-align:center"><div class="heat-cell heat-${v[a]}">${v[a]}</div></td>`).join('')}</tr>`).join('')}
    </table></div>
    <div class="card" style="margin-top:14px;border:none;padding:12px 0 0">
      <h3>Interpretation</h3>
      <p>The highest vulnerability concentrates where form and material integrity intersect with Historical, Technological, and Scientific values — all three depend on the physical survival of the megaliths. Landscape and Social values are most vulnerable to setting changes (development, visual intrusion). The unexcavated archive (Scientific) is uniquely fragile: any physical intervention — even professional excavation — reduces it irreversibly.</p>
    </div>
  </div>`;
  return html;
}

function renderProcess() {
  return `
    <div class="card-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi"><div class="value">${DATA.processQuality.strengths}</div><div class="label">Strengths</div></div>
      <div class="kpi"><div class="value" style="color:var(--red)">${DATA.processQuality.gaps}</div><div class="label">Data Gaps</div></div>
      <div class="kpi"><div class="value">${DATA.processQuality.quickBoosts.length}</div><div class="label">Quick Boosts</div></div>
    </div>
    <div class="process-grid">
      <div class="card">
        <h3>Next Steps</h3>
        ${DATA.processQuality.nextSteps.map(s=>`<p style="margin:6px 0">→ ${s}</p>`).join('')}
      </div>
      <div class="card">
        <h3>Quick Boosts</h3>
        ${DATA.processQuality.quickBoosts.map(s=>`<p style="margin:6px 0">⚡ ${s}</p>`).join('')}
      </div>
    </div>
    <div class="card">
      <h3>Sources</h3>
      ${DATA.dataQuality.sources.map(s=>`<div class="source-item">${s}</div>`).join('')}
    </div>
    <div class="card">
      <h3>Stages Completed</h3>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
        ${[0,1,2,3,4,5,6].map(s => {
          const done = DATA.stagesCompleted.includes(s);
          const labels = ['Preliminary','Description','Values','Integrity','Comparative','Significance','Quality Check'];
          return `<span class="pill" style="background:${done?'var(--green-bg)':'#f1f5f9'};color:${done?'var(--green)':'var(--muted)'}">${s}. ${labels[s]} ${done?'✓':'—'}</span>`;
        }).join('')}
      </div>
    </div>`;
}

function renderKG() {
  return `<div class="kg-tab">
    <div class="kg-banner">This is a miniature view. The standalone Knowledge Graph artifact has richer features including AI query, analytics, and full interactivity.</div>
    <div id="kg-svg-container" style="width:100%;height:420px"></div>
  </div>`;
}

function initKG() {
  if (currentTab !== 'kg') return;
  const container = document.getElementById('kg-svg-container');
  if (!container || typeof d3 === 'undefined') return;
  container.innerHTML = '';

  const width = container.clientWidth;
  const height = 420;
  const svg = d3.select(container).append('svg').attr('width',width).attr('height',height);
  const g = svg.append('g');

  svg.call(d3.zoom().scaleExtent([0.4,3]).on('zoom',e=>g.attr('transform',e.transform)));

  svg.append('defs').append('marker').attr('id','arr').attr('viewBox','-0 -4 8 8')
    .attr('refX',18).attr('refY',0).attr('orient','auto').attr('markerWidth',5).attr('markerHeight',5)
    .append('path').attr('d','M0,-3L7,0L0,3').attr('fill','#475569');

  const nodes = DATA.kg.nodes.map(n=>({...n}));
  const edges = DATA.kg.edges.map(e=>({...e,source:e.from,target:e.to}));

  const sim = d3.forceSimulation(nodes)
    .force('link',d3.forceLink(edges).id(d=>d.id).distance(130))
    .force('charge',d3.forceManyBody().strength(-320))
    .force('center',d3.forceCenter(width/2,height/2))
    .force('collision',d3.forceCollide(35));

  const link = g.append('g').selectAll('path').data(edges).join('path')
    .attr('fill','none').attr('stroke','#475569').attr('stroke-width',1).attr('stroke-opacity',0.5).attr('marker-end','url(#arr)');

  const linkLabel = g.append('g').selectAll('text').data(edges).join('text')
    .attr('font-size',8).attr('fill','#64748b').attr('text-anchor','middle').attr('dy',-4)
    .text(d=>d.label.replace(/_/g,' '));

  const node = g.append('g').selectAll('g').data(nodes).join('g').style('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

  const radius = d => d.id==='asset'?14:d.type==='Cultural Value'?10:8;
  node.append('circle').attr('r',radius).attr('fill',d=>KG_COLORS[d.type]||'#78909C').attr('stroke','#0a1120').attr('stroke-width',1.5);
  node.filter(d=>d.id==='asset').append('text').attr('text-anchor','middle').attr('dy',4).attr('font-size',10).attr('fill','#fff').text('★');

  // Labels with halo
  node.append('text').attr('dy',d=>radius(d)+12).attr('text-anchor','middle').attr('font-size',8)
    .attr('fill','#0a1120').attr('stroke','#0a1120').attr('stroke-width',2.5).attr('paint-order','stroke')
    .text(d=>d.name.length>18?d.name.slice(0,18)+'…':d.name);
  node.append('text').attr('dy',d=>radius(d)+12).attr('text-anchor','middle').attr('font-size',8)
    .attr('fill','#e2e8f0').text(d=>d.name.length>18?d.name.slice(0,18)+'…':d.name);

  // Popover
  let popover = null;
  node.on('click',(event,d)=>{
    event.stopPropagation();
    if(popover) popover.remove();
    const n = DATA.kg.nodes.find(x=>x.id===d.id);
    const conns = DATA.kg.edges.filter(e=>e.from===d.id||e.to===d.id);
    let px = d.x+20, py = d.y-40;
    if(px+200>width) px = d.x-220;
    if(py<10) py=10; if(py+160>height) py=height-170;

    popover = g.append('foreignObject').attr('x',px).attr('y',py).attr('width',200).attr('height',180);
    popover.append('xhtml:div').style('background','rgba(15,23,42,0.95)').style('border','1px solid #334155')
      .style('border-radius','8px').style('padding','10px').style('color','#e2e8f0').style('font-size','11px')
      .style('font-family','Segoe UI, sans-serif').style('overflow','hidden')
      .html(`<div style="font-weight:600;font-size:12px;margin-bottom:4px">${n.name}</div>
        <div style="display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;background:${KG_COLORS[n.type]||'#666'};color:#fff;margin-bottom:6px">${n.type}</div>
        <div style="color:#94a3b8;margin-bottom:6px">${n.meaning}</div>
        <div style="border-top:1px solid #334155;padding-top:6px;font-size:10px;color:#64748b">${conns.length} connections</div>
        <div style="text-align:right;margin-top:4px"><span onclick="if(popover){popover.remove();popover=null}" style="cursor:pointer;color:#64748b;font-size:10px">✕ close</span></div>`);

    link.attr('stroke-opacity',e=>(e.source.id===d.id||e.target.id===d.id)?0.9:0.08);
    linkLabel.attr('fill-opacity',e=>(e.source.id===d.id||e.target.id===d.id)?1:0.08);
  });

  svg.on('click',()=>{
    if(popover){popover.remove();popover=null}
    link.attr('stroke-opacity',0.5);linkLabel.attr('fill-opacity',1);
  });

  sim.on('tick',()=>{
    link.attr('d',d=>{const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y,dr=Math.sqrt(dx*dx+dy*dy)*2;return`M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`});
    linkLabel.attr('x',d=>(d.source.x+d.target.x)/2+(d.target.y-d.source.y)*0.05).attr('y',d=>(d.source.y+d.target.y)/2-(d.target.x-d.source.x)*0.05);
    node.attr('transform',d=>`translate(${d.x},${d.y})`);
    if(popover){const pd=popover.datum();/* popover follows node if needed */}
  });
}

// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const renderers = {
    overview:renderOverview, timeline:renderTimeline, contexts:renderContexts,
    values:renderValues, integrity:renderIntegrity, comparative:renderComparative,
    significance:renderSignificance, vulnerability:renderVulnerability,
    process:renderProcess, kg:renderKG
  };

  app.innerHTML = `
    <div class="header">
      <h1>${DATA.asset.name}</h1>
      <div class="subtitle">CBSA Assessment Dashboard</div>
      <div class="meta">
        <span>📍 ${DATA.asset.location}</span>
        <span>📅 ${DATA.asset.period}</span>
      </div>
    </div>
    <div class="tabs">
      ${TABS.map(t=>`<button class="tab${currentTab===t.key?' active':''}" onclick="switchTab('${t.key}')">${t.icon} ${t.label}</button>`).join('')}
    </div>
    ${renderHighlightBanner()}
    <div class="tab-content active">
      ${(renderers[currentTab]||renderOverview)()}
    </div>`;

  if (currentTab === 'kg') setTimeout(initKG, 50);
}

// Load D3 from CDN then render
(function(){
  if (typeof d3 !== 'undefined') { render(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js';
  s.onload = () => render();
  s.onerror = () => { render(); };
  document.head.appendChild(s);
})();
</script>
</body>
</html>
